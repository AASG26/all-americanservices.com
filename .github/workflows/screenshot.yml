name: Screenshot Preview

on:
  push:
    branches-ignore:
      - screenshots
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

# Serialize screenshot uploads to prevent race conditions on the screenshots branch
concurrency:
  group: screenshots-branch
  cancel-in-progress: false

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Write inline screenshot script
        run: |
          cat > /tmp/screenshot.mjs <<'EOF'
          import { chromium } from 'playwright';

          const VIEWPORTS = {
            desktop: { width: 1280, height: 800 },
            mobile:  { width: 375,  height: 667 }
          };

          const url = process.argv[2];
          const output = process.argv[3];
          const viewportArg = process.argv.find(a => a.startsWith('--viewport='));
          const viewport = viewportArg
            ? VIEWPORTS[viewportArg.split('=')[1]] || VIEWPORTS.desktop
            : VIEWPORTS.desktop;

          const browser = await chromium.launch();
          const context = await browser.newContext({ viewport });
          const page = await context.newPage();
          await page.goto(url, { waitUntil: 'networkidle' });
          await page.screenshot({ path: output, fullPage: true });
          await browser.close();

          console.log(`Screenshot saved: ${output} (${viewport.width}x${viewport.height})`);
          EOF

      - name: Serve docs/ and take screenshots
        run: |
          if [ ! -f docs/index.html ]; then
            echo "docs/index.html not found — nothing to screenshot." >&2
            exit 1
          fi
          npx --yes http-server docs -p 4321 -s &
          SERVER_PID=$!
          for i in {1..30}; do
            curl -sf http://localhost:4321 > /dev/null && echo "Server ready" && break
            sleep 1
          done
          node /tmp/screenshot.mjs http://localhost:4321 desktop.png --viewport=desktop
          node /tmp/screenshot.mjs http://localhost:4321 mobile.png  --viewport=mobile
          kill $SERVER_PID || true

      - name: Upload to screenshots branch
        id: upload
        run: |
          set -e
          cp desktop.png /tmp/desktop.png
          cp mobile.png  /tmp/mobile.png
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git fetch origin screenshots 2>/dev/null; then
            git checkout -B screenshots origin/screenshots
          else
            git checkout --orphan screenshots
            git reset --hard
            echo "# Preview Screenshots" > README.md
            git add README.md
            git commit -m "Initialize screenshots branch"
          fi
          COUNT=$(ls -1 *-desktop.png 2>/dev/null | wc -l || echo 0)
          NEXT_NUM=$(printf "%06d" $((COUNT + 1)))
          DESKTOP="${NEXT_NUM}-desktop.png"
          MOBILE="${NEXT_NUM}-mobile.png"
          cp /tmp/desktop.png "$DESKTOP"
          cp /tmp/mobile.png  "$MOBILE"
          git add "$DESKTOP" "$MOBILE"
          BRANCH_NAME="${{ github.event.pull_request.head.ref || github.ref_name }}"
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          git commit -m "$BRANCH_NAME - $COMMIT_SHA"
          git push origin screenshots
          echo "num=$NEXT_NUM"         >> $GITHUB_OUTPUT
          echo "desktop=$DESKTOP"      >> $GITHUB_OUTPUT
          echo "mobile=$MOBILE"        >> $GITHUB_OUTPUT
          sleep 5

      - name: Find PR for branch
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request') {
              const prNumber = context.payload.pull_request.number;
              core.setOutput('pr_number', prNumber);
              return prNumber;
            }
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (prs.length > 0) {
              core.setOutput('pr_number', prs[0].number);
              return prs[0].number;
            }
            return null;

      - name: Comment on PR
        if: steps.find-pr.outputs.pr_number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.pr_number || 0 }};
            const num = '${{ steps.upload.outputs.num }}';
            const baseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/raw/screenshots`;
            const desktopUrl = `${baseUrl}/${num}-desktop.png`;
            const mobileUrl  = `${baseUrl}/${num}-mobile.png`;
            const commit = (context.eventName === 'pull_request'
              ? context.payload.pull_request.head.sha
              : context.sha).substring(0, 7);
            const body = [
              '## 📸 Preview Screenshots',
              '',
              `**Commit:** \`${commit}\` | **Set:** \`${num}\``,
              '',
              '<details open>',
              '<summary>Desktop (1280×800)</summary>',
              '',
              `![Desktop](${desktopUrl})`,
              '</details>',
              '',
              '<details>',
              '<summary>Mobile (375×667)</summary>',
              '',
              `![Mobile](${mobileUrl})`,
              '</details>',
              '',
              '---',
              '*Auto-generated by Screenshot Preview workflow*'
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.find(c => c.body.includes('Auto-generated by Screenshot Preview workflow'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }